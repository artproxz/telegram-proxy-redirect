<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Telegram Proxy Hub v2.0.4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0b1120; color: #e2e8f0;
            min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
            padding: 24px 12px;
        }
        .container {
            max-width: 680px; width: 100%; margin: 0 auto;
            background: rgba(15,23,42,0.9); backdrop-filter: blur(12px);
            border-radius: 24px; padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45); border: 1px solid #1e293b;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 12px; border-bottom: 1px solid #1e293b; margin-bottom: 16px;
        }
        .version { font-size: 0.8rem; font-weight: 500; color: #94a3b8; }
        .stats { font-size: 0.75rem; color: #64748b; }
        h1 { font-size: 1.5rem; font-weight: 600; text-align: center; margin: 8px 0 6px; }
        .sub { text-align: center; font-size: 0.85rem; color: #64748b; margin-bottom: 20px; }
        
        /* 🔹 Карточки прокси */
        .proxy-card {
            background: #111827; border-radius: 16px; padding: 12px 14px;
            margin-bottom: 10px; display: grid; grid-template-columns: auto 1fr auto;
            gap: 12px; align-items: center; position: relative;
            border: 2px solid transparent; transition: all 0.25s ease;
            overflow: hidden;
        }
        .proxy-card.active {
            border-color: #facc15;
            box-shadow: 0 0 16px rgba(250,204,21,0.25), inset 0 0 24px rgba(250,204,21,0.05);
            animation: goldGlow 2.5s infinite alternate ease-in-out;
        }
        @keyframes goldGlow {
            0% { box-shadow: 0 0 16px rgba(250,204,21,0.2), inset 0 0 24px rgba(250,204,21,0.03); }
            100% { box-shadow: 0 0 24px rgba(250,204,21,0.4), inset 0 0 36px rgba(250,204,21,0.08); }
        }
        .proxy-card.active::before {
            content: ''; position: absolute; top: 0; left: -50%; width: 200%; height: 2px;
            background: linear-gradient(90deg, transparent, #facc15, transparent);
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer { 0% { transform: translateX(-50%); } 100% { transform: translateX(50%); } }
        
        /* ⬜ Использованный прокси — серый, но КЛИКАБЕЛЬНЫЙ */
        .proxy-card.used {
            filter: grayscale(0.85); opacity: 0.75;
            border-color: #475569; animation: none !important;
        }
        .proxy-card.used::after {
            content: '✓'; position: absolute; top: 6px; right: 10px;
            color: #22c55e; font-weight: bold; font-size: 0.9rem;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .proxy-card.used .btn {
            background: linear-gradient(135deg, #475569, #334155);
            box-shadow: none; opacity: 0.9;
        }
        .proxy-card.used .btn:hover { filter: brightness(1.05); }
        
        .flag { font-size: 1.8rem; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
        .info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .host { font-weight: 500; color: #f1f5f9; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { display: flex; gap: 8px; align-items: center; font-size: 0.75rem; color: #94a3b8; }
        .type-badge {
            background: #3b82f620; color: #60a5fa; padding: 2px 6px; border-radius: 4px;
            font-weight: 500; font-size: 0.65rem; text-transform: uppercase;
        }
        .ping-badge {
            padding: 2px 6px; border-radius: 4px; font-weight: 500; min-width: 42px; text-align: center;
        }
        .ping-good { background: #22c55e20; color: #4ade80; }
        .ping-mid { background: #eab30820; color: #facc15; }
        .ping-bad { background: #ef444420; color: #f87171; }
        
        .btn {
            background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff;
            border: none; padding: 8px 16px; border-radius: 10px; font-weight: 500;
            cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
            box-shadow: 0 2px 8px rgba(14,165,233,0.25);
        }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn:active { transform: translateY(0); }
        
        .footer {
            text-align: center; margin-top: 18px; font-size: 0.75rem; color: #64748b;
            display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .refresh-btn {
            background: none; border: 1px solid #334155; color: #94a3b8;
            padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 0.7rem;
            transition: 0.15s;
        }
        .refresh-btn:hover { border-color: #64748b; color: #e2e8f0; }
        
        .loader { text-align: center; padding: 40px 20px; color: #94a3b8; }
        .spinner {
            width: 28px; height: 28px; border: 3px solid #1e293b; border-top-color: #0ea5e9;
            border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { background: #450a0a; border: 1px solid #7f1d1d; padding: 12px; border-radius: 12px; text-align: center; margin: 20px 0; color: #fca5a5; }
        .notice { background: #1e293b; border-left: 3px solid #3b82f6; padding: 8px 12px; margin: 12px 0; border-radius: 6px; font-size: 0.75rem; color: #94a3b8; }
        .source-tag { font-size: 0.65rem; opacity: 0.6; margin-left: auto; }

        @media (max-width: 520px) {
            .proxy-card { grid-template-columns: 1fr; gap: 8px; }
            .btn { width: 100%; text-align: center; }
            .proxy-card.active::before { animation-duration: 4s; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="loader">
        <div class="spinner"></div>
        <div>Загрузка прокси из @ProxyFree_Ru...</div>
    </div>
</div>

<script>
    const VERSION = "2.0.4";
    const REFRESH_MS = 3600000;
    const PING_INTERVAL = 10000;
    const CACHE_TTL = 1800000;
    const CACHE_KEY = `tgproxies_v${VERSION}`;
    const USED_KEY = `tgproxies_used_v${VERSION}`;

    const FLAGS = {
        "US":"🇺🇸","DE":"🇩🇪","NL":"🇳🇱","FR":"🇫🇷","GB":"🇬🇧","FI":"🇫🇮","RU":"🇷🇺",
        "UA":"🇺🇦","PL":"🇵🇱","SG":"🇸🇬","JP":"🇯🇵","IN":"🇮🇳","CA":"🇨🇦","AU":"🇦🇺",
        "BR":"🇧🇷","TR":"🇹🇷","IR":"🇮🇷","AE":"🇦🇪","IL":"🇮🇱","SE":"🇸🇪","NO":"🇳🇴",
        "CZ":"🇨🇿","LV":"🇱🇻","LT":"🇱🇹","EE":"🇪🇪","KZ":"🇰🇿","UZ":"🇺🇿","MD":"🇲🇩",
        "BY":"🇧🇾","GE":"🇬🇪","AM":"🇦🇲","AZ":"🇦🇿","VN":"🇻🇳","TH":"🇹🇭","MY":"🇲🇾"
    };
    const DEFAULT_FLAG = "🌐";

    const text = {
        title: "Прокси для Telegram",
        sub: "Источник: @ProxyFree_Ru • Автопроверка",
        connect: "Подключить",
        update: "Обновление через",
        refresh: "🔄",
        error: "Не удалось загрузить прокси. Проверьте соединение.",
        ping: "Пинг",
        notice: "Браузер проверяет доступность хоста. Для работы требуется клиент Telegram."
    };

    // 🔗 Источники — приоритет: ProxyFree_Ru → другие
    const SOURCES = [
        { url: "https://t.me/s/ProxyFree_Ru", type: "proxyfree", priority: 1 },
        { url: "https://mtproto.space/api/proxies", type: "api", priority: 2 },
        { url: "https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt", type: "txt", priority: 3 }
    ];

    // 🗄️ Кэш
    function loadCache() {
        try {
            const d = JSON.parse(localStorage.getItem(CACHE_KEY));
            if (d && Date.now() - d.time < CACHE_TTL) return d.proxies;
        } catch(e) {}
        return null;
    }
    function saveCache(proxies) {
        try { localStorage.setItem(CACHE_KEY, JSON.stringify({ proxies, time: Date.now() })); } catch(e) {}
    }

    // 📝 Парсинг tg://proxy и tg://socks
    function parseTgLink(line) {
        let m = line.match(/tg:\/\/proxy\?server=([^&]+)&port=(\d+)&secret=([^&\s]+)/i);
        if (m) return { type: "MTProto", server: decodeURIComponent(m[1]), port: m[2], secret: decodeURIComponent(m[3]), raw: line };
        m = line.match(/tg:\/\/socks\?server=([^&]+)&port=(\d+)/i);
        if (m) return { type: "SOCKS5", server: decodeURIComponent(m[1]), port: m[2], raw: line };
        return null;
    }

    // 📝 Парсинг формата ProxyFree_Ru: Server/Port/Secret в тексте
    function parseProxyFreeBlock(text) {
        const proxies = [];
        // Ищем блоки с Server/Port/Secret
        const blocks = text.split(/(?=🔐\s*MTProto Proxy|🔐\s*Proxy)/i);
        for (const block of blocks) {
            const serverMatch = block.match(/Server\s*[:：]\s*`?([^`\n\r]+)`?/i);
            const portMatch = block.match(/Port\s*[:：]\s*`?(\d+)`?/i);
            const secretMatch = block.match(/Secret\s*[:：]\s*`?([^`\n\r]+)`?/i);
            const countryMatch = block.match(/🇷🇺|🇺🇸|🇩🇪|🇳🇱|🇫🇷|🇬🇧|🇫🇮|🇺🇦|🇵🇱|🇸🇬|🇯🇵|🇮🇳|🇨🇦|🇦🇺|🇧🇷|🇹🇷|🇮🇷|🇦🇪|🇮🇱|🇸🇪|🇳🇴|🇨🇿|🇱🇻|🇱🇹|🇪🇪|🇰🇿|🇺🇿|🇲🇩|🇧🇾|🇬🇪|🇦🇲|🇦🇿|🇻🇳|🇹🇭|🇲🇾/);
            
            if (serverMatch && portMatch && secretMatch) {
                const server = serverMatch[1].trim();
                const port = portMatch[1];
                const secret = secretMatch[1].trim();
                const flag = countryMatch ? countryMatch[0] : DEFAULT_FLAG;
                proxies.push({
                    type: "MTProto", server, port, secret,
                    raw: `tg://proxy?server=${encodeURIComponent(server)}&port=${port}&secret=${encodeURIComponent(secret)}`,
                    flag, source: "proxyfree"
                });
            }
        }
        return proxies;
    }

    // 🔍 Проверка доступности хоста
    async function pingHost(server, port, timeout = 3000) {
        return new Promise(resolve => {
            const start = performance.now();
            const img = new Image();
            const t = setTimeout(() => { cleanup(); resolve(null); }, timeout);
            const cleanup = () => { clearTimeout(t); img.onload = img.onerror = null; img.src = ""; };
            img.onload = img.onerror = () => {
                cleanup();
                const p = Math.round(performance.now() - start);
                resolve(p < timeout ? p : null);
            };
            img.src = `https://${server}:${port}/ping?t=${Date.now()}`;
        });
    }

    function getFlag(country) {
        if (!country) return DEFAULT_FLAG;
        const c = country.toUpperCase();
        return FLAGS[c] || DEFAULT_FLAG;
    }

    // 📥 Загрузка прокси
    async function fetchProxies() {
        const cached = loadCache();
        if (cached?.length) return { proxies: cached, fromCache: true };

        for (const src of SOURCES.sort((a,b)=>a.priority-b.priority)) {
            try {
                let proxies = [];
                
                if (src.type === "proxyfree") {
                    const r = await fetch(src.url, { headers: { "Accept": "text/html" } });
                    if (!r.ok) continue;
                    const html = await r.text();
                    // Извлекаем текстовый контент из <div class="tgme_widget_message_text">
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, "text/html");
                    const messages = doc.querySelectorAll(".tgme_widget_message_text");
                    let content = "";
                    messages.forEach(m => content += m.textContent + "\n");
                    proxies = parseProxyFreeBlock(content);
                }
                else if (src.type === "api") {
                    const r = await fetch(src.url); if (!r.ok) continue;
                    const json = await r.json();
                    const arr = Array.isArray(json) ? json : (json.proxies || json.items || []);
                    proxies = arr.filter(p => (p.status||"online").toLowerCase() !== "offline")
                        .map(p => parseTgLink(p.link || p.raw || `tg://proxy?server=${p.server||p.domain}&port=${p.port}&secret=${p.secret}`))
                        .filter(Boolean)
                        .map(p => ({ ...p, flag: getFlag(p.country || p.location) }));
                }
                else if (src.type === "txt") {
                    const r = await fetch(src.url); if (!r.ok) continue;
                    const text = await r.text();
                    proxies = text.split("\n").map(parseTgLink).filter(Boolean).slice(0, 25)
                        .map(p => ({ ...p, flag: DEFAULT_FLAG }));
                }

                if (proxies.length >= 2) {
                    // Убираем дубликаты
                    const seen = new Set();
                    proxies = proxies.filter(p => {
                        const key = `${p.server}:${p.port}`;
                        if (seen.has(key)) return false;
                        seen.add(key);
                        return true;
                    }).slice(0, 20);
                    
                    saveCache(proxies);
                    return { proxies, fromCache: false, source: src.type };
                }
            } catch(e) { console.warn(`Source ${src.url} failed:`, e); }
        }
        return { proxies: [], fromCache: false };
    }

    // 🎨 Рендер
    function render(proxies, sourceName) {
        let html = `
            <div class="header">
                <div class="version">v${VERSION}</div>
                <div class="stats">📡 Найдено: ${proxies.length}</div>
            </div>
            <h1>${text.title}</h1>
            <div class="sub">${text.sub}${sourceName ? ` • Источник: ${sourceName}` : ""}</div>
            <div class="notice">${text.notice}</div>
        `;

        if (!proxies.length) {
            html += `<div class="error">${text.error}</div>`;
        } else {
            for (const p of proxies) {
                const used = isUsed(p);
                const ping = p.ping || null;
                const pingCls = ping ? (ping < 100 ? "ping-good" : ping < 250 ? "ping-mid" : "ping-bad") : "";
                
                html += `
                    <div class="proxy-card ${used ? "used" : "active"}" data-key="${p.server}:${p.port}">
                        <div class="flag">${p.flag}</div>
                        <div class="info">
                            <div class="host" title="${p.server}:${p.port}">${p.server}</div>
                            <div class="meta">
                                <span class="type-badge">${p.type}</span>
                                <span class="ping-badge ${pingCls}" id="ping-${p.server}-${p.port}">
                                    ${ping ? `📡 ${ping}ms` : "🔄"}
                                </span>
                            </div>
                        </div>
                        <button class="btn" onclick="connectProxy('${p.raw}')">${text.connect}</button>
                        <span class="source-tag">${p.source || "API"}</span>
                    </div>
                `;
            }
        }

        const next = new Date(Date.now() + REFRESH_MS);
        html += `
            <div class="footer">
                ${text.update}: <span id="countdown">--:--</span>
                <button class="refresh-btn" onclick="location.reload()">${text.refresh}</button>
            </div>
        `;
        document.getElementById("app").innerHTML = html;
        
        if (proxies.length) {
            startPingLoop(proxies);
            startCountdown(next);
        }
    }

    function isUsed(p) {
        try { return JSON.parse(localStorage.getItem(USED_KEY) || "[]").includes(`${p.server}:${p.port}`); }
        catch(e) { return false; }
    }
    function markUsed(p) {
        try {
            const arr = JSON.parse(localStorage.getItem(USED_KEY) || "[]");
            const k = `${p.server}:${p.port}`;
            if (!arr.includes(k)) { arr.push(k); localStorage.setItem(USED_KEY, JSON.stringify(arr.slice(-50))); }
        } catch(e) {}
    }

    // 📡 Пинг каждые 10 сек
    async function startPingLoop(proxies) {
        const update = async () => {
            for (const p of proxies) {
                const el = document.getElementById(`ping-${p.server}-${p.port}`);
                if (!el) continue;
                const ping = await pingHost(p.server, p.port, 2500);
                if (ping) {
                    const cls = ping < 100 ? "ping-good" : ping < 250 ? "ping-mid" : "ping-bad";
                    el.innerHTML = `📡 ${ping}ms`;
                    el.className = `ping-badge ${cls}`;
                } else {
                    el.innerHTML = "⚠️";
                    el.className = "ping-badge ping-bad";
                }
            }
        };
        update();
        setInterval(update, PING_INTERVAL);
    }

    function formatCountdown(t) {
        const d = t - Date.now();
        if (d <= 0) return "00:00";
        return `${Math.floor(d/60000).toString().padStart(2,'0')}:${Math.floor((d%60000)/1000).toString().padStart(2,'0')}`;
    }
    function startCountdown(t) {
        const el = document.getElementById("countdown");
        if (!el) return;
        const i = setInterval(() => {
            if (el) el.textContent = formatCountdown(t);
            if (Date.now() >= t) { clearInterval(i); location.reload(); }
        }, 1000);
    }

    // ✅ Подключение — НЕ блокируем кнопку, просто отмечаем визуально
    window.connectProxy = function(rawLink) {
        // Отмечаем как использованный (для визуала)
        const match = rawLink.match(/server=([^&]+)&port=(\d+)/);
        if (match) {
            markUsed({ server: match[1], port: match[2] });
            // Обновляем карточку: добавляем класс used, но НЕ отключаем кнопку
            const card = document.querySelector(`.proxy-card[data-key="${match[1]}:${match[2]}"]`);
            if (card) {
                card.classList.add("used");
                // Кнопка остаётся кликабельной — просто меняем текст на мгновение
                const btn = card.querySelector(".btn");
                if (btn) {
                    const orig = btn.textContent;
                    btn.textContent = "✓";
                    setTimeout(() => { btn.textContent = orig; }, 800);
                }
            }
        }
        // Открываем ссылку
        window.location.href = rawLink;
    };

    // 🚀 Запуск
    document.addEventListener("DOMContentLoaded", async () => {
        const { proxies, fromCache, source } = await fetchProxies();
        const sourceName = source === "proxyfree" ? "@ProxyFree_Ru" : (source === "api" ? "mtproto.space" : "GitHub");
        render(proxies, sourceName);
    });
</script>
</body>
</html>
