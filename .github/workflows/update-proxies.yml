name: Fetch Telegram Proxies

on:
  schedule:
    - cron: '*/30 * * * *'  # Каждые 30 минут
  workflow_dispatch:        # Ручной запуск (кнопка)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  # ✅ Отменяем зависшие запуски

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4  # ✅ v4 — стабильная версия
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Fetch proxies
        run: node fetch-proxies.js
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add proxies.json
          
          if ! git diff --staged --quiet; then
            echo "Changes detected"
            # ✅ [skip ci] предотвращает рекурсивный запуск
            git commit -m "chore: update proxies $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git push
          else
            echo "No changes"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
